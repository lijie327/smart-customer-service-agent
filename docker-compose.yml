# 智能客服多 Agent 系统 - 容器编排（精简版，不含 nginx 反代）
# 用法：
#   1) cp .env.example .env  并填入 DASHSCOPE_API_KEY
#   2) docker compose up -d --build
#   3) 浏览器访问 http://<服务器IP>:8000
#
# 说明：
#   - app 直接对外暴露 8000 端口（未使用 nginx 反向代理，部署更简单）。
#   - 数据持久化：app-data 卷保存 SQLite + FAISS 索引；redis-data 保存会话。
#   - 如需 HTTPS / 域名 / 限流，可另行在前面加一层 nginx（历史 nginx.conf 模板可复用）。

services:
  redis:
    # 生产用 Redis。客户端 redis-py 已锁定 4.x（默认 RESP2 协议），
    # 因此既能连本地开发时的 Redis 5.0（本地 `uv run` 直连 localhost:6379），
    # 也能连本容器内的 7.x；无需为握手协议（HELLO/RESP3）担心。
    image: redis:7.2-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # 容器内通过服务名访问 redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      # 持久化：SQLite 数据库 + FAISS 索引 + 上传文件
      - app-data:/app/data
      - app-uploads:/app/uploads
    # 直接对外暴露（未使用 nginx 反代）
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  app-data:
  app-uploads:
  redis-data:
